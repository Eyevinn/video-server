version: '3.8'

services:
  video-server:
    build: .
    ports:
      - "3000:3000"    # Web interface and API
      - "1234:1234/udp" # UDP MPEG-TS output
      - "9998:9998"    # SRT output
      - "1935:1935"    # RTMP output
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - FFMPEG_LOG_LEVEL=error
      - FRAMERATE=25
      - RESOLUTION=1920x1080
      - VIDEO_BITRATE=5000k
      - AUDIO_BITRATE=128k
      - SRT_ENABLED=true
      - THUMBNAIL_ENABLED=true
      - THUMBNAIL_INTERVAL=5
    volumes:
      # Optional: Mount for persistent data or custom configurations
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:3000/api/status', (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }).on('error', () => process.exit(1));"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s